<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ศูนย์รักษาความปลอดภัย — กสฟ.</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1f2937 0%, #374151 50%, #f97316 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== CARD ===== */
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 36px;
      width: 440px;
      max-width: 95vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .card-logo { font-size: 48px; margin-bottom: 10px; }
    .card-title { font-size: 19px; font-weight: 700; color: #374151; margin-bottom: 4px; }
    .card-sub   { font-size: 13px; color: #64748b; margin-bottom: 28px; }

    /* ===== SCREEN TOGGLE ===== */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ===== LOGIN ===== */
    .pw-input-wrap { position: relative; margin-bottom: 8px; }
    .pw-input-wrap input {
      width: 100%;
      padding: 12px 44px 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 16px;
      text-align: center;
      letter-spacing: 4px;
      outline: none;
      transition: border-color 0.15s;
    }
    .pw-input-wrap input:focus { border-color: #f97316; }
    .pw-input-wrap input.error { border-color: #ef4444; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: #94a3b8; font-size: 17px; padding: 2px;
    }
    .pw-error { color: #ef4444; font-size: 12px; min-height: 18px; margin-bottom: 16px; }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #f97316;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(249,115,22,0.2), 0 4px 10px rgba(249,115,22,0.18);
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: #ea580c; box-shadow: 0 2px 6px rgba(249,115,22,0.25), 0 8px 18px rgba(249,115,22,0.28); }
    .btn-primary:active { transform: translateY(1px); }

    /* ===== AREA SELECTION ===== */
    .area-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 13px 16px;
      margin-bottom: 10px;
      border: 1.5px solid #fed7aa;
      border-radius: 8px;
      background: #fff7ed;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: #c2410c;
      cursor: pointer;
      text-align: left;
      box-shadow: 0 1px 3px rgba(249,115,22,0.08);
      transition: border-color 0.15s, color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    .area-btn:last-child { margin-bottom: 0; }
    .area-btn:hover { border-color: #f97316; background: #ffedd5; box-shadow: 0 2px 8px rgba(249,115,22,0.2); }
    .area-btn.overview { border-color: #cbd5e0; background: linear-gradient(135deg, rgba(31,41,55,0.05) 0%, rgba(249,115,22,0.06) 100%); color: #374151; box-shadow: 0 1px 3px rgba(15,23,42,0.06); }
    .area-btn.overview:hover { border-color: #94a3b8; background: linear-gradient(135deg, rgba(31,41,55,0.08) 0%, rgba(249,115,22,0.1) 100%); box-shadow: 0 2px 8px rgba(15,23,42,0.1); }
    .area-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #f97316;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.2);
      flex-shrink: 0;
    }
    .area-dot.overview { background: #64748b; box-shadow: 0 0 0 3px rgba(100,116,139,0.15); }

    /* ===== MAIN MENU ===== */
    .menu-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .menu-area-label {
      font-size: 13px;
      font-weight: 600;
      color: #c2410c;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      padding: 5px 14px 5px 10px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-settings-group { display: flex; gap: 6px; }
    .btn-settings {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      padding: 6px 12px 6px 10px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: #475569;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-settings svg { width: 13px; height: 13px; flex-shrink: 0; }
    .btn-settings:hover { border-color: #f97316; color: #c2410c; background: #fff7ed; box-shadow: 0 1px 4px rgba(249,115,22,0.1); }
    .btn-settings.danger:hover { border-color: #ef4444; color: #ef4444; background: #fef2f2; box-shadow: 0 1px 4px rgba(239,68,68,0.12); }

    .menu-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 18px 20px;
      margin-bottom: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      background: white;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    .menu-btn:last-child { margin-bottom: 0; }
    .menu-btn:hover { border-color: #f97316; background: #fff7ed; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(249,115,22,0.15); }
    .menu-btn-icon { font-size: 32px; flex-shrink: 0; }
    .menu-btn-text { text-align: left; }
    .menu-btn-title { font-size: 15px; font-weight: 700; color: #374151; margin-bottom: 3px; }
    .menu-btn-desc  { font-size: 12px; color: #94a3b8; }
    .menu-btn.disabled { opacity: 0.5; cursor: not-allowed; }
    .menu-btn.disabled:hover { transform: none; box-shadow: none; border-color: #e2e8f0; background: white; }
    .wip-badge {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fef3c7;
      color: #b45309;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px 3px 8px;
      border-radius: 999px;
      border: 1px solid #fde68a;
      white-space: nowrap;
    }
    .wip-badge .wip-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #d97706;
      box-shadow: 0 0 0 3px rgba(217,119,6,0.18);
      flex-shrink: 0;
      animation: wip-pulse 1.6s ease-in-out infinite;
    }
    @keyframes wip-pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(217,119,6,0.18); }
      50%       { box-shadow: 0 0 0 5px rgba(217,119,6,0.05); }
    }

    /* ===== RESPONSIVE (mobile) ===== */
    @media (max-width: 480px) {
      body { align-items: flex-start; padding: 24px 0 40px; }

      .card {
        padding: 28px 20px;
        border-radius: 12px;
        width: 100%;
        max-width: 100%;
        min-height: 100svh;
        box-shadow: none;
      }

      .card-logo  { font-size: 40px; }
      .card-title { font-size: 17px; }
      .card-sub   { font-size: 12px; margin-bottom: 22px; }

      /* login */
      .pw-input-wrap input { font-size: 18px; padding: 14px 44px 14px 16px; }
      .btn-primary { padding: 14px; font-size: 16px; min-height: 50px; }

      /* area */
      .area-btn { padding: 14px 14px; font-size: 13px; }
      .area-icon { font-size: 20px; }

      /* menu header — stack ถ้าแคบ */
      .menu-header { flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
      .btn-settings-group { width: 100%; justify-content: flex-end; }

      /* menu buttons */
      .menu-btn { padding: 16px 14px; gap: 12px; }
      .menu-btn-icon  { font-size: 28px; }
      .menu-btn-title { font-size: 14px; }
      .menu-btn-desc  { font-size: 11px; }
      .wip-badge { font-size: 10px; }

      /* กันปุ่มเล็กเกิน — touch target */
      .btn-settings { padding: 8px 12px; font-size: 12px; min-height: 36px; }
    }
  </style>
</head>
<body>
<div class="card">

  <!-- ===== SCREEN 1: LOGIN ===== -->
  <div class="screen active" id="screenLogin">
    <div class="card-logo">🔐</div>
    <div class="card-title">ศูนย์รักษาความปลอดภัย</div>
    <div class="card-sub">กองสถานีไฟฟ้า — กรุณากรอกรหัสผ่านเพื่อเข้าสู่ระบบ</div>
    <input type="text" name="username" autocomplete="username"
      style="position:absolute;opacity:0;height:0;width:0;pointer-events:none;"
      tabindex="-1" aria-hidden="true" />
    <div class="pw-input-wrap">
      <input type="password" id="loginInput" name="password" autocomplete="current-password"
        placeholder="••••••••" maxlength="30"
        onkeydown="if(event.key==='Enter') doLogin()" />
      <button class="pw-toggle" onclick="toggleLoginVis()" title="แสดง/ซ่อน">👁</button>
    </div>
    <div class="pw-error" id="loginError"></div>
    <button class="btn-primary" onclick="doLogin()">เข้าสู่ระบบ</button>
  </div>

  <!-- ===== SCREEN 2: AREA SELECTION ===== -->
  <div class="screen" id="screenArea">
    <div class="card-logo">🏢</div>
    <div class="card-title">เลือกพื้นที่ของคุณ</div>
    <div class="card-sub">ระบบบันทึกข้อมูลศูนย์รักษาความปลอดภัยสถานีไฟฟ้า</div>
    <button class="area-btn" onclick="selectArea('บางแค')">
      <span class="area-dot"></span>ศูนย์รักษาความปลอดภัยสถานีไฟฟ้าบางแค
    </button>
    <button class="area-btn" onclick="selectArea('บางบัวทอง')">
      <span class="area-dot"></span>ศูนย์รักษาความปลอดภัยสถานีไฟฟ้าบางบัวทอง
    </button>
    <button class="area-btn" onclick="selectArea('พระประแดง')">
      <span class="area-dot"></span>ศูนย์รักษาความปลอดภัยสถานีไฟฟ้าพระประแดง
    </button>
    <button class="area-btn overview" onclick="selectArea('ภาพรวม')">
      <span class="area-dot overview"></span>ภาพรวมทั้ง 3 ศูนย์
    </button>
  </div>

  <!-- ===== SCREEN 3: MAIN MENU ===== -->
  <div class="screen" id="screenMenu">
    <div class="menu-header">
      <span class="menu-area-label">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M8 14s5-4.5 5-8A5 5 0 0 0 3 6c0 3.5 5 8 5 8Z"/><circle cx="8" cy="6" r="1.5"/></svg>
        <span id="menuAreaLabel">—</span>
      </span>
      <div class="btn-settings-group">
        <button id="btnChangeArea" class="btn-settings" onclick="changeArea()" title="เปลี่ยนพื้นที่">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9"/><path d="M13.5 2.5v2.6h-2.6"/></svg>
          เปลี่ยนพื้นที่
        </button>
        <button class="btn-settings danger" onclick="logout()" title="ออกจากระบบ">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3H4a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h6"/><path d="M8 8h6m0 0-2-2m2 2-2 2"/></svg>
          ออกจากระบบ
        </button>
      </div>
    </div>
    <div class="card-logo">📋</div>
    <div class="card-title" style="margin-bottom:4px">เมนูหลัก</div>
    <div class="card-sub">เลือกระบบที่ต้องการใช้งาน</div>
    <button class="menu-btn" onclick="goTo('page2.html')">
      <span class="menu-btn-icon">📝</span>
      <div class="menu-btn-text">
        <div class="menu-btn-title">ระบบบันทึกเข้าสถานีไฟฟ้า</div>
        <div class="menu-btn-desc">บันทึกผู้เข้าปฏิบัติงานในสถานีไฟฟ้า</div>
      </div>
    </button>
    <button class="menu-btn disabled" title="อยู่ระหว่างดำเนินการ">
      <span class="menu-btn-icon">🔧</span>
      <div class="menu-btn-text">
        <div class="menu-btn-title">ระบบสมุดบันทึก</div>
        <div class="menu-btn-desc">บันทึกรายการอุปกรณ์ขัดข้อง</div>
      </div>
      <span class="wip-badge"><span class="wip-dot"></span>เร็วๆ นี้</span>
    </button>
  </div>

</div>

<script>
  /* ===== Config ===== */
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbziuDE16i0jq4knGer6xqBByV1Kb2BjyHeF9bt8FJID5TLK7EhZeFwPqUb4scvMgdPK/exec';

  /* ===== Screen Management ===== */
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  /* ===== Init: เช็ค session ที่มีอยู่ ===== */
  function checkLogin() {
    const token = sessionStorage.getItem('mea_token');
    const area  = sessionStorage.getItem('mea_area');
    const role  = sessionStorage.getItem('mea_role');
    if (!token) { showScreen('screenLogin'); return; }
    if (!area && role === 'user') { sessionStorage.clear(); showScreen('screenLogin'); return; }
    if (!area) { showScreen('screenArea'); return; }
    applyArea(area, role);
    showScreen('screenMenu');
  }

  /* ===== Login ===== */
  async function doLogin() {
    const input = document.getElementById('loginInput');
    const err   = document.getElementById('loginError');
    const btn   = document.querySelector('#screenLogin .btn-primary');
    const token = input.value.trim();
    if (!token) { err.textContent = 'กรุณากรอกรหัสผ่าน'; return; }

    btn.disabled    = true;
    btn.textContent = 'กำลังตรวจสอบ...';
    err.textContent = '';
    input.classList.remove('error');

    try {
      const ctrl  = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 8000);
      const res   = await fetch(
        `${SCRIPT_URL}?action=verify&token=${encodeURIComponent(token)}&t=${Date.now()}`,
        { signal: ctrl.signal, redirect: 'follow' }
      );
      clearTimeout(timer);
      if (!res.ok) throw new Error('http');
      const data = await res.json();
      if (!data.valid) throw new Error('invalid');

      sessionStorage.setItem('mea_token', token);
      sessionStorage.setItem('mea_role',  data.role);
      input.value = '';

      if (data.role === 'user') {
        sessionStorage.setItem('mea_area', data.area);
        applyArea(data.area, 'user');
        showScreen('screenMenu');
      } else {
        const area = sessionStorage.getItem('mea_area');
        if (area) { applyArea(area, 'master'); showScreen('screenMenu'); }
        else       { showScreen('screenArea'); }
      }
    } catch(e) {
      err.textContent = e.message === 'invalid'
        ? 'รหัสผ่านไม่ถูกต้อง กรุณาลองใหม่'
        : 'ไม่สามารถเชื่อมต่อได้ กรุณาลองใหม่';
      input.classList.add('error');
      input.value = '';
      input.focus();
    } finally {
      btn.disabled    = false;
      btn.textContent = 'เข้าสู่ระบบ';
    }
  }

  function toggleLoginVis() {
    const inp = document.getElementById('loginInput');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  /* ===== Area Selection (master เท่านั้น) ===== */
  function selectArea(area) {
    sessionStorage.setItem('mea_area', area);
    applyArea(area, 'master');
    showScreen('screenMenu');
  }

  function applyArea(area, role) {
    const label = area === 'ภาพรวม' ? 'ภาพรวมทั้ง 3 ศูนย์' : area;
    document.getElementById('menuAreaLabel').textContent = label;
    document.getElementById('btnChangeArea').style.display = role === 'user' ? 'none' : '';
  }

  /* ===== Settings (เปลี่ยนศูนย์ / logout) ===== */
  function changeArea() {
    sessionStorage.removeItem('mea_area');
    showScreen('screenArea');
  }

  function logout() {
    sessionStorage.clear();
    showScreen('screenLogin');
  }

  /* ===== Navigate ===== */
  function goTo(page) {
    window.location.href = page;
  }

  /* ===== Boot ===== */
  checkLogin();
</script>
</body>
</html>
